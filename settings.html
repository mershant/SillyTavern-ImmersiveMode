<div class="immersive_mode_settings">
  <div class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
      <b>Immersive Mode</b>
      <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>
    <div class="inline-drawer-content">
      <div style="display:flex; flex-direction:column; gap:8px">
        <label class="checkbox_label"><input type="checkbox" class="im_auto_open" /> Auto-open immersive mode for new assistant messages</label>
        <label class="checkbox_label"><input type="checkbox" class="im_split_big_blocks" /> Split big narration blocks</label>
        <label class="checkbox_label"><input type="checkbox" class="im_show_progress" /> Show progress rail</label>
        <label class="checkbox_label"><input type="checkbox" class="im_show_message_ids" /> Show subtle message IDs</label>
        <label class="checkbox_label"><input type="checkbox" class="im_show_button" /> Show immersive button on messages</label>
        <label class="checkbox_label"><input type="checkbox" class="im_fade_on_end" /> Fade back to chat when the last beat finishes</label>
        <label class="checkbox_label"><input type="checkbox" class="im_show_inmode_controls" /> Show in-mode reading controls</label>
        <label class="checkbox_label"><input type="checkbox" class="im_hide_st_chrome" /> Hide top bar and chat bar while immersive is open</label>
        <label class="checkbox_label"><input type="checkbox" class="im_context_preview" /> Show previous/next context ghosts</label>
        <label class="checkbox_label"><input type="checkbox" class="im_prevent_code_html" /> Prevent HTML/code blocks from being captured</label>
      </div>

      <div style="margin-top:10px">
        <label>Extraction Mode</label>
      </div>
      <select class="text_pole im_extraction_mode">
        <option value="sentence">Per sentence</option>
        <option value="punctuation">Per punctuation</option>
        <option value="balanced">Balanced blocks</option>
      </select>

      <div style="margin-top:10px">
        <label>Display Mode</label>
      </div>
      <select class="text_pole im_display_mode">
        <option value="spotlight">Spotlight</option>
        <option value="teleprompter">Teleprompter</option>
        <option value="rotary">Rotary</option>
      </select>

      <div style="margin-top:10px">
        <label>Text Position</label>
      </div>
      <select class="text_pole im_position">
        <option value="center">Center</option>
        <option value="top">Top</option>
        <option value="bottom">Bottom</option>
      </select>

      <div style="margin-top:10px">
        <label>Scroll Mode</label>
      </div>
      <select class="text_pole im_scroll_mode">
        <option value="threshold">True free threshold</option>
        <option value="step">Single-step</option>
      </select>

      <div style="margin-top:10px">
        <label>Scroll Weight</label>
      </div>
      <select class="text_pole im_weight">
        <option value="heavy">Heavy</option>
        <option value="silk">Silk</option>
        <option value="fast">Fast</option>
      </select>

      <div style="margin-top:10px">
        <label>Glass Text Material</label>
      </div>
      <select class="text_pole im_material">
        <option value="pearl">Pearl</option>
        <option value="crystal">Crystal</option>
        <option value="etched">Etched</option>
        <option value="liquid">Liquid</option>
      </select>

      <div style="margin-top:10px">
        <label>Threshold</label>
      </div>
      <input type="range" class="im_threshold" min="0.25" max="0.75" step="0.01" />
      <small>How far you must scroll toward the next beat before it centers automatically.</small>

      <div style="margin-top:10px">
        <label>Font Size</label>
      </div>
      <input type="range" class="im_font_size" min="18" max="64" step="1" />

      <div style="margin-top:10px">
        <label>Line Spread</label>
      </div>
      <input type="range" class="im_spread" min="130" max="320" step="5" />
      <small>Distance between beats while scrolling; larger values give big text more breathing room.</small>

      <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap">
        <button class="menu_button im_open_now">Open latest assistant message</button>
        <button class="menu_button im_close_now">Close immersive mode</button>
      </div>
    </div>
  </div>
</div>
